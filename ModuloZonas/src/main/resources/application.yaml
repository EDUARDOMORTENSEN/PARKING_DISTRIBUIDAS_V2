spring:
  application:
    name: zonas

  datasource:
    url: jdbc:postgresql://localhost:5432/test
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${PUBLIC_KEY_URL:http://gestion-usuarios:3001/api/usuarios/auth/jwks}
  
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq} # Cambia 'rabbitmq-broker' por el nombre real de tu contenedor
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    org.springframework.security: TRACE

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: ec.edu.espe.zonas.controladores
  # Añadimos explícitamente la URL pública de Kong
  openapi:
    servers:
      - url: ${KONG_URL:http://localhost:8000}
        description: Kong API Gateway

app:
  rabbitmq:
    exchange: ${RABBITMQ_EXCHANGE:audit_exchange}
    queue: ${RABBITMQ_QUEUE:audit_queue}
    routing-key: ${RABBITMQ_ROUTING_KEY:audit.event}
    audit-exchange: ${AUDIT_EXCHANGE:audit_exchange}
    audit-routing-key: ${AUDIT_ROUTING_KEY:audit.event}