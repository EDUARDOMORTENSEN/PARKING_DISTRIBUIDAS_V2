version: '3.8'

services:

  # ─────────────── BASES DE DATOS ───────────────

  db-vehiculos:
    image: postgres:16-alpine
    container_name: db-vehiculos
    environment:
      POSTGRES_USER: vehiculos
      POSTGRES_PASSWORD: vehiculos
      POSTGRES_DB: vehiculos
    volumes:
      - db-vehiculos-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vehiculos"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-usuarios:
    image: postgres:16-alpine
    container_name: db-usuarios
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: usuarios
      POSTGRES_PASSWORD: usuarios
      POSTGRES_DB: usuarios
    volumes:
      - db-usuarios-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usuarios"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-zonas:
    image: postgres:16-alpine
    container_name: db-zonas
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: test
    ports:
      - "5433:5432"
    volumes:
      - db-zonas-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-tickets:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tickets
    volumes:
      - db-tickets-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-asignaciones:
    image: postgres:16-alpine
    container_name: db-asignaciones
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: asignaciones
      POSTGRES_PASSWORD: asignaciones
      POSTGRES_DB: asignaciones
    volumes:
      - db-asignaciones-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asignaciones"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-audit:
    image: postgres:16-alpine
    container_name: db-audit
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: auditoria
    volumes:
      - db-audit-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────── MICROSERVICIOS ───────────────

  zonas:
    build:
      context: ./ModuloZonas
    container_name: zonas-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-zonas:5432/test
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE}
      RABBITMQ_ROUTING_KEY: ${RABBITMQ_ROUTING_KEY}
      AUDIT_EXCHANGE: audit_exchange
      AUDIT_ROUTING_KEY: audit.event
      KONG_URL: ${KONG_URL}
      PUBLIC_KEY_URL: ${PUBLIC_KEY_URL}
    depends_on:
      db-zonas:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - default
      - audit-net

  vehiculos:
    build:
      context: ./VehiclesNPM/vehiculos
    container_name: vehiculos-service
    environment:
      PORT: 3000
      DB_HOST: db-vehiculos
      DB_PORT: 5432
      DB_USUARIO: vehiculos
      DB_CONTRASENA: vehiculos
      DB_NOMBRE: vehiculos
      ZONAS_SERVICE_URL: http://kong:8000/api/v1/zonas
      GESTION_USUARIOS_URL: http://kong:8000/api/usuarios
      PUBLIC_KEY_URL: ${PUBLIC_KEY_URL}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_QUEUE: audit_queue
      RABBITMQ_EXCHANGE: audit_exchange
      RABBITMQ_ROUTING_KEY: audit.event
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db-vehiculos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - default
      - audit-net

  gestion-usuarios:
    build:
      context: ./gestion-usuarios
    container_name: gestion-usuarios-service
    environment:
      PORT: 3001
      DB_HOST: db-usuarios
      DB_PORT: 5432
      DB_USUARIO: usuarios
      DB_CONTRASENA: usuarios
      DB_NOMBRE: usuarios
      ROOT_USER_NAME: super
      ROOT_USER_LASTNAME: usuario
      ROOT_USER_DNI: 1728143247
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_QUEUE: audit_queue
      RABBITMQ_EXCHANGE: audit_exchange
      RABBITMQ_ROUTING_KEY: audit.event
    depends_on:
      db-usuarios:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "3001:3001"
    networks:
      - default
      - audit-net


  ticket-service:
    build: ./ticket-service
    ports:
      - "8002:8002"
    environment:
      DB_HOST: db-tickets
      DB_PORT: 5432
      DB_NAME: tickets
      DB_USER: postgres
      DB_PASSWORD: postgres
      TARIFA_ESPACIO: "1.50"
      TARIFA_HORA_MINIMA: "1.0"
      ZONAS_URL: http://kong:8000
      VEHICULOS_URL: http://kong:8000
      USUARIOS_URL: http://kong:8000
      PUBLIC_KEY_URL: ${PUBLIC_KEY_URL}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
      RABBITMQ_EXCHANGE: parking.events
      RABBITMQ_ROUTING_KEY: ticket.#
      AUDIT_EXCHANGE: audit_exchange
      AUDIT_ROUTING_KEY: audit.event
    depends_on:
      - db-tickets
    networks:
      - default
      - audit-net


  assignment-service:
    build:
      context: ./assignment-service
    container_name: assignment-service
    environment:
      PORT: 3002
      DB_HOST: db-asignaciones
      DB_PORT: 5432
      DB_USUARIO: asignaciones
      DB_CONTRASENA: asignaciones
      DB_NOMBRE: asignaciones
      GESTION_USUARIOS_URL: http://kong:8000/api/usuarios
      VEHICULOS_SERVICE_URL: http://kong:8000/api/vehiculos
      PUBLIC_KEY_URL: ${PUBLIC_KEY_URL}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_QUEUE: audit_queue
      RABBITMQ_EXCHANGE: audit_exchange
      RABBITMQ_ROUTING_KEY: audit.event
    depends_on:
      db-asignaciones:
        condition: service_healthy
      gestion-usuarios:
        condition: service_started
      vehiculos:
        condition: service_started
    ports:
      - "3002:3002"
    networks:
      - default
      - audit-net


  audit-service:
    build:
      context: ./ms-auditoria
    container_name: audit-service
    env_file:
      - .env
    environment:
      PORT: 3003
      DB_HOST: db-audit
      DB_PORT: 5432
      DB_USER: audit
      DB_PASSWORD: audit
      DB_NAME: auditoria
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_QUEUE: audit_queue
      RABBITMQ_EXCHANGE: audit_exchange
      RABBITMQ_ROUTING_KEY: audit.event
    depends_on:
      db-audit:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "3003:3003"
    networks:
      - default
      - audit-net


  # ─────────────── INFRAESTRUCTURA ───────────────

  kong:
    image: kong:latest
    container_name: kong-gateway
    depends_on:
      - vehiculos
      - gestion-usuarios
      - zonas
      - assignment-service
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_UNTRUSTED_LUA_SANDBOX_REQUIRES: resty.http,cjson.safe
      # Por defecto Kong lanza un worker por CPU (16 en esta máquina) y cada
      # uno resuelve DNS de los hostnames de docker-compose por separado la
      # primera vez que los usa (~6-7s de latencia fría). Con menos workers
      # se "calienta" la caché de DNS de todos mucho más rápido.
      KONG_NGINX_WORKER_PROCESSES: "2"
    ports:
      - "8000:8000"   # Proxy — único punto de entrada público
      - "8001:8001"   # Admin API
    volumes:
      - ./kong.yml:/opt/kong/kong.yml:ro

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: swagger-ui
    ports:
      - "8081:8080"
    environment:
      URLS: >-
        [
          { "url": "http://localhost:8000/docs/vehiculos", "name": "Vehiculos" },
          { "url": "http://localhost:8000/docs/usuarios", "name": "Usuarios" },
          { "url": "http://localhost:8000/docs/zonas", "name": "Zonas" },
          { "url": "http://localhost:8000/docs/tickets", "name": "Tickets" },
          { "url": "http://localhost:8000/docs/asignaciones", "name": "Asignaciones" },
          { "url": "http://localhost:8000/docs/auditoria", "name": "Auditoria" }
        ]

   # --- El servicio de RabbitMQ ---
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq_dev
    # Configura credenciales explícitas en lugar de usar guest/guest
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"      # Puerto de comunicación de AMQP (para Node.js)
      - "15672:15672"    # Puerto del panel de administración web (Management Plugin)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    # Asegura que RabbitMQ tenga tiempo de iniciar antes de que otros servicios lo busquen
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - default
      - audit-net

networks:
  audit-net:
    driver: bridge

volumes:
  db-vehiculos-data:
  db-usuarios-data:
  db-zonas-data:
  db-tickets-data:
  db-asignaciones-data:
  rabbitmq_data:
  db-audit-data: