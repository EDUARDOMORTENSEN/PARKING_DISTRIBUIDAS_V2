_format_version: "3.0"

# El plugin de CORS se mantiene global para que aplique a todo (API y Docs)
plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:8081"
        - "http://localhost:5500"
        - "http://localhost:5173"
      methods:
        - GET
        - HEAD
        - PUT
        - PATCH
        - POST
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - X-Auth-Token
        - Authorization
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600

services:
  # ==========================================
  # SERVICIO ZONAS (API Protegida)
  # ==========================================
  - name: zonas-espacios-service
    url: http://zonas:8080
    routes:
      - name: zonas-espacios-route
        paths:
          - /api/v1/zonas
          - /api/v1/espacios
        strip_path: false
    plugins:
      - name: pre-function
        config:
          access:
            - |
              local http = require "resty.http"
              local cjson = require "cjson.safe"
              local httpc = http.new()

              local method = kong.request.get_method()
              if method == "OPTIONS" then
                local origin = kong.request.get_header("Origin")
                local allowed_origins = {
                  ["http://localhost:8081"] = true,
                  ["http://localhost:5500"] = true,
                  ["http://localhost:5173"] = true,
                }
                local cors_headers = {
                  ["Access-Control-Allow-Methods"] = "GET, HEAD, PUT, PATCH, POST, DELETE, OPTIONS",
                  ["Access-Control-Allow-Headers"] = "Accept, Accept-Version, Content-Length, Content-MD5, Content-Type, Date, X-Auth-Token, Authorization",
                  ["Access-Control-Allow-Credentials"] = "true",
                  ["Access-Control-Max-Age"] = "3600",
                }
                if origin and allowed_origins[origin] then
                  cors_headers["Access-Control-Allow-Origin"] = origin
                end
                return kong.response.exit(204, "", cors_headers)
              end
              local path = kong.request.get_path()

              local public_paths = {
                { path = "^/api/usuarios/auth/login", method = "POST" },
                { path = "^/api/usuarios/auth/refresh", method = "POST" },
                { path = "^/api/usuarios/auth/jwks", method = "GET" },
                { path = "^/api/usuarios/personas/?$", method = "POST" },
                { path = "^/api/gateway/vehiculos/", method = "GET" },
                { path = "^/api/gateway/ingresos", method = "POST" },
                { path = "^/api/gateway/salidas", method = "POST" }
              }
              for _, p in ipairs(public_paths) do
                if string.match(path, p.path) and method == p.method then
                  return
                end
              end

              local auth_header = kong.request.get_header("Authorization")
              if not auth_header then
                return kong.response.exit(401, { message = "Falta el header Authorization" })
              end
              
              local res, err = httpc:request_uri("http://gestion-usuarios:3001/api/usuarios/auth/validate", {
                method = "GET",
                headers = {
                  ["Authorization"] = auth_header,
                  ["X-Original-Method"] = method,
                  ["X-Original-Path"] = path,
                },
                timeout = 3000,
              })

              if not res then
                kong.log.err("auth-validate error: ", err)
                return kong.response.exit(502, { message = "No se pudo validar la identidad" })
              end

              if res.status ~= 200 then
                return kong.response.exit(res.status, res.body)
              end

              local user = cjson.decode(res.body)
              if user then
                kong.service.request.set_header("X-User-Id", tostring(user.userId or ""))
                kong.service.request.set_header("X-User-Username", tostring(user.username or ""))
                kong.service.request.set_header("X-User-Roles", table.concat(user.roles or {}, ","))
                kong.service.request.set_header("X-User-Permissions", table.concat(user.permissions or {}, ","))
              end

  # Docs Zonas (Público — se elimina Authorization para evitar que Spring Security
  # intente validar el JWT en el endpoint de docs)
  - name: zonas-docs-service
    url: http://zonas:8080/v3/api-docs
    routes:
      - name: zonas-docs-route
        paths:
          - /docs/zonas
        strip_path: true
    plugins:
      - name: request-transformer
        config:
          remove:
            headers:
              - Authorization

