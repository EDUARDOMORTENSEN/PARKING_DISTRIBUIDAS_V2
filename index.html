<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard de prueba - SSE Espacios</title>
    <!-- Tailwind CSS vía CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="app.css" />
</head>
<body class="bg-gray-100 p-6 font-sans antialiased">

    <div class="max-w-3xl mx-auto mb-6">
        <h1 class="text-3xl font-bold text-gray-800 text-center">🅿️ Prueba de SSE - Espacios</h1>
        <p class="text-center text-gray-500 text-sm mt-1">
            Inicia sesión con un usuario que tenga permiso ZONAS_READ para ver los espacios en vivo.
        </p>
    </div>

    <!-- Login -->
    <div id="loginSection" class="max-w-sm mx-auto bg-white rounded-lg shadow p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">Iniciar sesión</h2>
        <form id="loginForm" class="flex flex-col gap-3">
            <input id="username" type="text" placeholder="Usuario" required
                class="border rounded px-3 py-2 text-sm" />
            <input id="password" type="password" placeholder="Contraseña" required
                class="border rounded px-3 py-2 text-sm" />
            <button type="submit"
                class="bg-blue-600 text-white rounded py-2 text-sm font-semibold hover:bg-blue-700">
                Ingresar
            </button>
            <p id="loginError" class="text-red-600 text-sm hidden"></p>
        </form>
    </div>

    <!-- Dashboard -->
    <div id="dashboardSection" class="max-w-7xl mx-auto hidden">
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-4">
                <span id="totalEspacios" class="text-sm bg-blue-100 text-blue-800 px-3 py-1 rounded-full">Cargando...</span>
                <span class="flex items-center gap-2 text-sm">
                    <span class="w-3 h-3 bg-green-500 rounded-full inline-block" id="indicator"></span>
                    <span id="statusText">Conectado</span>
                </span>
            </div>
            <button id="logoutBtn" class="text-sm text-red-600 hover:underline">Cerrar sesión</button>
        </header>

        <div id="espaciosContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
            <!-- Las tarjetas se inyectan dinámicamente desde app.js -->
        </div>

        <div class="mt-8 bg-white rounded-lg shadow p-4">
            <h3 class="font-semibold text-gray-700 mb-2 text-sm">Eventos SSE recibidos</h3>
            <div id="eventLog" class="text-xs text-gray-600"></div>
        </div>

        <footer class="mt-8 text-sm text-gray-500 text-center border-t pt-4">
            Última actualización: <span id="lastUpdate">--</span>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
