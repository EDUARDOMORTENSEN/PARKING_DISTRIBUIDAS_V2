name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-java:
    name: Test ModuloZonas (Java/Maven)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Run Maven Tests
        working-directory: ./ModuloZonas
        run: ./mvnw test

  test-node:
    name: Test NestJS Microservices
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gestion-usuarios, assignment-service, VehiclesNPM/vehiculos]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './${{ matrix.service }}/package-lock.json'
          
      - name: Install dependencies
        working-directory: ./${{ matrix.service }}
        run: npm ci
        
      - name: Run Unit Tests
        working-directory: ./${{ matrix.service }}
        run: npm run test

  test-python:
    name: Test ticket-service (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        working-directory: ./ticket-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Pytest
        working-directory: ./ticket-service
        run: pytest

  test-e2e:
    name: End-to-End Tests (Docker Compose)
    runs-on: ubuntu-latest
    needs: [test-java, test-node, test-python]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install E2E Dependencies
        run: pip install requests
        
      - name: Start Docker Compose infrastructure
        run: docker compose up -d --build
        
      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to initialize..."
          sleep 45
          docker compose ps
          
      - name: Run E2E Python Test Script
        run: python test.py
        
      - name: View Logs on Failure
        if: failure()
        run: docker compose logs
